name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "github" --verbosity minimal

  deploy:
    name: Trigger Dokploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Call Dokploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/dokploy_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json")

          BODY=$(cat /tmp/dokploy_response.txt)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Dokploy webhook failed with HTTP $HTTP_STATUS"
            exit 1
          fi
